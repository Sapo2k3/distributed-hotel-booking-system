services:
  hotel-node-1:
    build:
      context: .
      dockerfile: ./hotel-node/Dockerfile
    container_name: hotel-node-1
    environment:
      HOTEL_NODE_ID: hotel-1
      HOTEL_NODE_PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - hotel-node-1-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - distributed-booking

  hotel-node-2:
    build:
      context: .
      dockerfile: ./hotel-node/Dockerfile
    container_name: hotel-node-2
    environment:
      HOTEL_NODE_ID: hotel-2
      HOTEL_NODE_PORT: 8082
    ports:
      - "8082:8082"
    volumes:
      - hotel-node-2-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - distributed-booking

  coordinator:
    build:
      context: .
      dockerfile: ./coordinator/Dockerfile
    container_name: coordinator
    environment:
      COORDINATOR_PORT: 8080
      HOTEL_1_ID: hotel-1
      HOTEL_1_HOST: hotel-node-1
      HOTEL_1_PORT: 8081
      HOTEL_2_ID: hotel-2
      HOTEL_2_HOST: hotel-node-2
      HOTEL_2_PORT: 8082
    depends_on:
      hotel-node-1:
        condition: service_healthy
      hotel-node-2:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/hotels"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - distributed-booking

networks:
  distributed-booking:
    driver: bridge

volumes:
  hotel-node-1-data:
  hotel-node-2-data: