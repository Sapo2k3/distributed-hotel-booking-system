services:
  hotel-node-1:
    build:
      context: .
      dockerfile: ./hotel-node/Dockerfile
    container_name: hotel-node-1
    environment:
      HOTEL_NODE_ID: hotel-1
      HOTEL_NODE_PORT: 8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - distributed-booking

  hotel-node-2:
    build:
      context: .
      dockerfile: ./hotel-node/Dockerfile
    container_name: hotel-node-2
    environment:
      HOTEL_NODE_ID: hotel-2
      HOTEL_NODE_PORT: 8082
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - distributed-booking

  coordinator:
    build:
      context: .
      dockerfile: ./coordinator/Dockerfile
    container_name: coordinator
    depends_on:
      hotel-node-1:
        condition: service_healthy
      hotel-node-2:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - distributed-booking

networks:
  distributed-booking:
    driver: bridge